<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validador de Documentos</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="text-white py-4 mb-4">
        <div class="container d-flex justify-content-between align-items-center">
            <h1 class="m-0 h3"><i class="fas fa-file-shield me-2"></i>Validador de Documentos</h1>
        </div>
    </header>

    <main class="container mb-5">
        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3"><i class="fas fa-database me-2"></i>Base de Dados</h5>
                        <div id="status-planilha">
                            </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3"><i class="fas fa-file-pdf me-2"></i>Documentos para Validação</h5>
                        <div class="mb-3">
                            <label for="document-urls" class="form-label text-muted">Cole as URLs dos PDFs (separadas por vírgula ou quebra de linha. Máx: 3)</label>
                            <textarea class="form-control" id="document-urls" rows="4" placeholder="https://exemplo.com/doc1.pdf&#10;https://exemplo.com/doc2.pdf"></textarea>
                        </div>
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <button class="btn btn-primary btn-lg px-4" id="iniciar-validacao" disabled>
                                <i class="fas fa-play me-2"></i>Iniciar Validação
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4" id="secao-progresso" style="display: none;">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <h5 class="card-title mb-3"><i class="fas fa-cogs me-2"></i>Processamento</h5>
                        <div class="progress mb-3">
                            <div class="progress-bar progress-bar-striped progress-bar-animated" id="progress-bar" role="progressbar" style="width: 0%;" aria-valuenow="0" aria-valuemin="0" aria-valuemax="100"></div>
                        </div>
                        <div id="log-processamento" class="p-3 font-monospace text-light rounded" style="height: 150px; overflow-y: auto;">
                            </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row" id="secao-resultados" style="display: none;">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-3">
                    <h4 class="m-0"><i class="fas fa-clipboard-check me-2"></i>Relatório de Validação</h4>
                    <button class="btn btn-success" id="download-relatorio">
                        <i class="fas fa-download me-2"></i>Baixar JSON
                    </button>
                </div>
                <div id="resultados-container">
                    </div>
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
